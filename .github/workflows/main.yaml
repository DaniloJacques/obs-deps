name: build_deps

on:
  push:
    branches:
      - uranite-fork
    tags:
      - '20[2-9][0-9]-[0-9][0-9]-[0-9][0-9]-uranite'
  pull_request:
    paths-ignore:
      - '**.md'
    branches:
      - uranite-fork
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

# ============================================================================
# PROFILE REGISTRY (add new profiles here)
# ============================================================================
# Each x64 profile produces a separate set of deps+ffmpeg artifacts.
# The "stock" entry (profile: '') uses x86-64-v3 as baseline.
#
# To add a new profile (e.g. zen4):
#   1. Add 'zen4' to the profile list in ffmpeg-windows-build AND windows-build
#   2. Add 'x64-zen4' to the arch loop in auto-release packaging
#   3. Add the switch case in utils.pwsh/Setup-Target.ps1
#
# Based on Uranite/obs-deps (https://github.com/Uranite/obs-deps)
# ============================================================================

jobs:
  pre-checks:
    name: Run Pre-Checks
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    outputs:
      seekingTesters: ${{ steps.checks.outputs.seekingTesters }}
      shortHash: ${{ steps.checks.outputs.shortHash }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for GitHub Labels
        id: checks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          : Check for GitHub Labels

          case "${GITHUB_EVENT_NAME}" in
            pull_request)
              if gh pr view ${{ github.event.number }} --json labels \
                | jq -e -r '.labels[] | select(.name == "Seeking Testers")' > /dev/null; then
                echo "seekingTesters=true" >> $GITHUB_OUTPUT
              else
                echo "seekingTesters=false" >> $GITHUB_OUTPUT
              fi
              ;;
            *)
              echo "seekingTesters=false" >> $GITHUB_OUTPUT
              ;;
          esac

          echo "shortHash=${GITHUB_SHA:0:9}" >> $GITHUB_OUTPUT

  # ==========================================================================
  # FFmpeg (Windows x64 only, multi-profile)
  # ==========================================================================
  ffmpeg-windows-build:
    name: Build FFmpeg for Windows
    runs-on: windows-2025-vs2026
    needs: pre-checks
    strategy:
      fail-fast: true
      matrix:
        target: [x64]
        # ── PROFILE LIST ── add new profiles here ──
        profile: [tigerlake, zen3]
        config: [Release]
        type: [static]
        include:
          # Stock build (x86-64-v3 baseline)
          - target: x64
            profile: ''
            config: Release
            type: static
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Environment
        id: setup
        run: |
          # Setup Environment

          $Target='${{ matrix.target }}'
          $ProfileSuffix = if ( '${{ matrix.profile }}' ) { "-${{ matrix.profile }}" } else { "" }
          $ArtifactName="ffmpeg-windows-${Target}${ProfileSuffix}-${{ needs.pre-checks.outputs.shortHash }}"
          $FileName="windows-ffmpeg-$(Get-Date -Format 'yyyy-MM-dd')-${Target}${ProfileSuffix}.zip"

          "artifactName=${ArtifactName}" >> $env:GITHUB_OUTPUT
          "artifactFileName=${FileName}" >> $env:GITHUB_OUTPUT

      - name: Build FFmpeg
        uses: ./.github/actions/build-ffmpeg
        with:
          target: ${{ matrix.target }}
          profile: ${{ matrix.profile }}
          type: ${{ matrix.type }}
          config: ${{ matrix.config }}

      - name: Publish Build Artifacts
        if: github.event_name != 'pull_request' || fromJSON(needs.pre-checks.outputs.seekingTesters)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.setup.outputs.artifactName }}
          path: ${{ github.workspace }}\windows\${{ steps.setup.outputs.artifactFileName }}

  # ==========================================================================
  # Windows Dependencies (x64 only, multi-profile)
  # ==========================================================================
  windows-build:
    name: Build Windows Dependencies
    runs-on: windows-2025-vs2026
    needs: pre-checks
    strategy:
      fail-fast: true
      matrix:
        target: [x64]
        # ── PROFILE LIST ── add new profiles here ──
        profile: [tigerlake, zen3]
        config: [Release]
        type: [static]
        include:
          # Stock build (x86-64-v3 baseline)
          - target: x64
            profile: ''
            config: Release
            type: static
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Environment
        id: setup
        run: |
          # Setup Environment

          $Target='${{ matrix.target }}'
          $ProfileSuffix = if ( '${{ matrix.profile }}' ) { "-${{ matrix.profile }}" } else { "" }
          $ArtifactName="deps-windows-${Target}${ProfileSuffix}-${{ needs.pre-checks.outputs.shortHash }}"
          $FileName="windows-deps-$(Get-Date -Format 'yyyy-MM-dd')-${Target}${ProfileSuffix}.zip"

          "artifactName=${ArtifactName}" >> $env:GITHUB_OUTPUT
          "artifactFileName=${FileName}" >> $env:GITHUB_OUTPUT

      - name: Build libajantv2 Debug
        shell: pwsh
        run: |
          # Build libajantv2 Debug

          $Params = @{
            Target = '${{ matrix.target }}'
            Configuration = 'Debug'
            Dependencies = 'libajantv2'
          }

          ./Build-Dependencies.ps1 @Params
          Remove-Item -Recurse -Force ${{ github.workspace }}/windows_build_temp

      - name: Build VPL Debug
        shell: pwsh
        run: |
          # Build VPL Debug

          $Params = @{
            Target = '${{ matrix.target }}'
            Configuration = 'Debug'
            Dependencies = 'vpl'
          }

          ./Build-Dependencies.ps1 @Params
          Remove-Item -Recurse -Force ${{ github.workspace }}/windows_build_temp

      - name: Build qrcodegencpp Debug
        shell: pwsh
        run: |
          # Build qrcodegencpp Debug

          $Params = @{
            Target = '${{ matrix.target }}'
            Configuration = 'Debug'
            Dependencies = 'qrcodegencpp'
          }

          ./Build-Dependencies.ps1 @Params
          Remove-Item -Recurse -Force ${{ github.workspace }}/windows_build_temp

      - name: Build Windows Dependencies
        uses: ./.github/actions/build-deps
        with:
          target: ${{ matrix.target }}
          profile: ${{ matrix.profile }}
          type: ${{ matrix.type }}
          config: ${{ matrix.config }}

      - name: Publish Build Artifacts
        if: github.event_name != 'pull_request' || fromJSON(needs.pre-checks.outputs.seekingTesters)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.setup.outputs.artifactName }}
          path: ${{ github.workspace }}\windows\${{ steps.setup.outputs.artifactFileName }}

  # ==========================================================================
  # Qt6 (Windows x64 only, no profiles needed — shared across all)
  # RelWithDebInfo only — Debug hangs 6+ hours with Clang-CL linker
  # ==========================================================================
  windows-qt6-build:
    name: Build Qt6 (Windows)
    runs-on: windows-2025-vs2026
    needs: pre-checks
    strategy:
      fail-fast: true
      matrix:
        target: [x64]
        config: [RelWithDebInfo]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Environment
        id: setup
        run: |
          # Setup Environment
          $ArtifactName="qt6-windows-${{ matrix.target }}-${{ matrix.config }}-${{ needs.pre-checks.outputs.shortHash }}"
          $FileName="windows-deps-qt6-$(Get-Date -Format 'yyyy-MM-dd')-${{ matrix.target }}-${{ matrix.config }}.zip"

          "artifactName=${ArtifactName}" >> $env:GITHUB_OUTPUT
          "artifactFileName=${FileName}" >> $env:GITHUB_OUTPUT

      - name: Build Windows Qt
        uses: ./.github/actions/build-qt
        with:
          target: ${{ matrix.target }}
          config: ${{ matrix.config }}

      - name: Publish Build Artifacts
        if: github.event_name != 'pull_request' || fromJSON(needs.pre-checks.outputs.seekingTesters)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.setup.outputs.artifactName }}
          path: ${{ github.workspace }}/windows/${{ steps.setup.outputs.artifactFileName }}

  # ==========================================================================
  # Auto Release (on every push to uranite-fork)
  # ==========================================================================
  auto-release:
    name: Auto Release (Uranite Fork)
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/uranite-fork'
    needs: [ffmpeg-windows-build, windows-build, windows-qt6-build]
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
    steps:
      - name: Get Metadata
        id: metadata
        run: |
          : Get Metadata
          echo "version=$(date +'%Y-%m-%d')-uranite" >> $GITHUB_OUTPUT

      - name: Download build artifacts
        uses: actions/download-artifact@v8

      - name: Package Windows dependencies
        run: |
          : Package Windows dependencies
          shopt -s extglob
          shopt -s nullglob

          # ── ARCH LOOP ── add new profiles as x64-<profile> ──
          for arch in x64-tigerlake x64-zen3 x64; do
            if [[ "$arch" == *"x64-"* ]]; then
               qt_search_arch="x64"
            else
               qt_search_arch=${arch}
            fi
            _temp=$(mktemp -d)
            pushd "${_temp}" > /dev/null

            for artifact in ${GITHUB_WORKSPACE}/**/windows-@(deps|ffmpeg)-!(qt6*)-${arch}.*; do
              case ${artifact} in
                *.zip) unzip -o ${artifact} > /dev/null ;;
                *.tar.xz) XZ_OPT=-T0 tar -xJf ${artifact} ;;
                *.tar.gz) tar -xzf ${artifact} ;;
              esac
            done

            if [ "$(ls -A .)" ]; then
              zip -r windows-deps-${{ steps.metadata.outputs.version }}-${arch}.zip -- *
              mv windows-deps-${{ steps.metadata.outputs.version }}-${arch}.zip ${GITHUB_WORKSPACE}
            fi

            files=("${GITHUB_WORKSPACE}"/qt6-windows-"${qt_search_arch}"-!(*-@(Debug|RelWithDebInfo|Release|MinSizeRel))/*.zip)
            for artifact in "${files[@]}"; do
              mv "${artifact}" "${GITHUB_WORKSPACE}" 2>/dev/null || true
            done
            popd > /dev/null
          done

      - name: Generate Checksums
        run: |
          : Generate Checksums
          shopt -s extglob
          echo "### OBS Deps Build (Uranite Fork)" > ${{ github.workspace }}/CHECKSUMS.txt
          echo "" >> ${{ github.workspace }}/CHECKSUMS.txt
          echo "Based on [Uranite/obs-deps](https://github.com/Uranite/obs-deps) with multi-profile optimizations." >> ${{ github.workspace }}/CHECKSUMS.txt
          echo "" >> ${{ github.workspace }}/CHECKSUMS.txt
          echo "**Profiles:**" >> ${{ github.workspace }}/CHECKSUMS.txt
          echo "- \`x64\` (stock): \`-march=x86-64-v3 -mtune=generic\`" >> ${{ github.workspace }}/CHECKSUMS.txt
          echo "- \`x64-tigerlake\`: \`-march=tigerlake -mtune=tigerlake\` + AVX-512" >> ${{ github.workspace }}/CHECKSUMS.txt
          echo "- \`x64-zen3\`: \`-march=znver3 -mtune=znver3\`" >> ${{ github.workspace }}/CHECKSUMS.txt
          echo "" >> ${{ github.workspace }}/CHECKSUMS.txt
          echo "### Checksums" >> ${{ github.workspace }}/CHECKSUMS.txt
          for file in ${{ github.workspace }}/@(*.zip); do
            echo "    ${file##*/}: $(sha256sum "${file}" | cut -d " " -f 1)" >> ${{ github.workspace }}/CHECKSUMS.txt
          done

      - name: Delete existing release
        run: |
          : Delete existing release
          gh release delete "${{ steps.metadata.outputs.version }}" --yes --repo ${{ github.repository }} 2>/dev/null || true
          git push origin --delete "refs/tags/${{ steps.metadata.outputs.version }}" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          draft: false
          prerelease: false
          tag_name: ${{ steps.metadata.outputs.version }}
          name: "OBS Deps Build ${{ steps.metadata.outputs.version }} (Uranite Fork)"
          body_path: ${{ github.workspace }}/CHECKSUMS.txt
          files: |
            ${{ github.workspace }}/windows-*-x64*.zip
